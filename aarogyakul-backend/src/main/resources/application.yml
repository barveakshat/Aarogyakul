spring:
  application:
    name: aarogyakul-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aarogyakul}
    username: ${DATABASE_USERNAME:aarogyakul}
    password: ${DATABASE_PASSWORD:aarogyakul}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors-origin: ${SERVER_CORS_ORIGIN:http://localhost:5173}
  jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32chars}
  jwt-expiry-hours: ${JWT_EXPIRY_HOURS:24}
  storage-mode: ${STORAGE_MODE:local}
  local-storage-dir: ${LOCAL_STORAGE_DIR:${java.io.tmpdir}/aarogyakul-documents}

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3-bucket-name: ${AWS_S3_BUCKET_NAME:}
  region: ${AWS_REGION:ap-south-1}

huggingface:
  api:
    url: ${HUGGINGFACE_API_URL:https://router.huggingface.co/v1/chat/completions}
    key: ${HUGGINGFACE_API_KEY:}

llama:
  model:
    name: ${LLAMA_MODEL_NAME:meta-llama/Llama-3.1-8B-Instruct}

tesseract:
  datapath: ${TESSDATA_PREFIX:}
